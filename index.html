<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eğitici Oyunlar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 2px solid #e94560;
    }

    header h1 {
      font-size: 2.8rem;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: #aaa;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .game-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(233, 69, 96, 0.3);
      border-color: #e94560;
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .card-body {
      padding: 20px;
    }

    .card-body h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .card-body p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
    }

    .card-tag {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 12px;
      background: #e94560;
      color: #fff;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #444;
      font-size: 0.85rem;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>

  <header>
    <h1>Eğitici Oyunlar</h1>
    <p>Sınıfta kullanmak için eğlenceli kelime oyunları</p>
  </header>

  <div class="games-grid">

    <a class="game-card" href="team_clash/index.html">
      <div class="card-image-placeholder">⚔️</div>
      <div class="card-body">
        <h2>Team Clash</h2>
        <p>İki takım arasında geçen heyecanlı kelime yarışması. Doğru cevapla takımını zafer için savaştır!</p>
        <span class="card-tag">Kelime Oyunu</span>
      </div>
    </a>

  </div>

  <footer>
    Tüm oyunlar sınıf kullanımı için tasarlanmıştır.
  </footer>

</body>
</html>
